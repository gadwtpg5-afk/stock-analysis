<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026年4月 — JP-STOCK RADAR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f9fa;
  --surface: #ffffff;
  --border: #e2e6ea;
  --border-hover: #b0b8c1;
  --text: #1a1d21;
  --muted: #6b7280;
  --accent: #1d4ed8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; line-height: 1.6; }
a { color: inherit; text-decoration: none; }

header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; }
.header-inner { max-width: 800px; margin: 0 auto; height: 54px; display: flex; align-items: center; justify-content: space-between; }
.site-name { font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 600; color: var(--accent); letter-spacing: .06em; }
.nav-back { font-size: 12px; color: var(--muted); }
.nav-back:hover { color: var(--accent); }

.hero { background: var(--surface); border-bottom: 1px solid var(--border); padding: 32px 24px 28px; }
.hero-inner { max-width: 800px; margin: 0 auto; }
.hero-eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: .1em; margin-bottom: 6px; }
.hero h1 { font-size: 22px; font-weight: 700; }

.list-wrap { max-width: 800px; margin: 0 auto; padding: 28px 24px; }
.section-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: .14em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.day-link {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 8px;
  transition: border-color .15s, box-shadow .15s;
}
.day-link:hover { border-color: var(--border-hover); box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.day-date { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; color: var(--accent); }
.day-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.day-arrow { color: var(--muted); font-size: 15px; }
.day-link:hover .day-arrow { color: var(--accent); }

footer { border-top: 1px solid var(--border); padding: 20px 24px; text-align: center; font-size: 11px; color: var(--muted); margin-top: 40px; }
</style>
</head>
<body>

<header>

<div class="hero">

    <h1>2026年 4月</h1>

</div>

<div class="list-wrap">
  <div class="section-label">日別レポート</div>

  <!-- 新しい日付ほど上に追加 -->

    </div>

</div>

  <p>本サイトは個人の情報整理目的で作成したものです。投資の推奨・勧誘を目的とするものではありません。</p>
  <p style="margin-top:5px;">© 2026 JP-STOCK RADAR &nbsp;|&nbsp; Powered by GitHub Pages</p>
</footer>
</body>
</html>
